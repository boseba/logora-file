name: Publish to NPM

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write
    id-token: write

jobs:
    validate:
        name: Lint, Test and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.0
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

            - name: Run tests
              run: npm run test

            - name: Build package
              run: npm run build

    dry-run:
        name: Dry Run Publish
        runs-on: ubuntu-latest
        needs: validate

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.0
                  registry-url: "https://registry.npmjs.org/"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build package
              run: npm run build

            - name: Publish dry run
              run: npm publish --dry-run --provenance

    publish:
        name: Publish to NPM
        runs-on: ubuntu-latest
        needs: dry-run
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.0
                  registry-url: "https://registry.npmjs.org/"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build package
              run: npm run build

            - name: Publish to npm
              run: npm publish --access public --provenance

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: publish

        steps:
            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true